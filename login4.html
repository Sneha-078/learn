<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .login{
            border: 1px solid rgb(162, 160, 160);
            width:300px;
            padding-right: 100px;
            padding-left: 50px;
            height: 400px;
            margin-top: 50px;
            margin-bottom: 50px;
            margin-left:450px ;


        }
        input{
            line-height: 30px;
            border-radius: 5px;
            padding-right:200px;
            border:1px solid rgb(216, 211, 211);
        }
        hr{
            width:366px;
        }
        #emailid{
            margin-top: 20px;
        }
        .loginid{
            text-align: center;
            padding: 10px;
            padding-left: 150px;
            padding-right: 185px;
            border-radius: 5px;
            border:1px solid whitesmoke;

        }
        .new_account{
            text-align: center;
            margin-right:10px;
            margin-left: 120px;
            border-radius: 5px;
            padding:5px 10px;
            border:1px solid whitesmoke;

        }
        a{
            border: 0px solid rgb(228, 225, 225);

            margin-left: 130px;
        }
    </style>

</head>
<body>
    <div class="login">
    <form>

        <input type="text" placeholder="Email or phone number" id="emailid"> <br><br>
        <input type="password" placeholder="Password"> <br><br>
        <button style="background-color:blue; color:white" class="loginid">Login</button> <br><br>
        <a href="#">Forgot Password? </a><hr>  <br>
       <button style="background-color: rgb(72, 203, 52); color:white" class="new_account">Create new account</button>
    </form>
    </div>

</body>
</html>
