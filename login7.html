<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
            table{
                border:1px solid blue;
                background-color: rgb(255, 203, 237);
                width:600px;
                height:600px;
                margin-left: 50px;
                padding-left: 50px;
            }

        </style>
</head>
<body>
    <form>
        <table>
            <tr>
                <td colspan="2" style="text-align:center;"><h1>Student Registration Form</h1></td> </tr>
            <tr>
                <td>Roll no:</td>
                <td><input type="text" style="padding-right:190px;"></td>
            </tr>
            <tr>
                <td>Student Name:</td>
                <td><input type="text" placeholder="First Name"> - <input type="text" placeholder="Last Name"></td>
            </tr>
            <tr>
                <td>Father's Name:</td>
                <td><input type="text" style="padding-right:190px;"></td>
            </tr>
            <tr>
                <td>Date of birth:</td>
                <td><input type="number" placeholder="Day" style="width:40px;"> - <input type="text" placeholder="Month" style="width:40px;"> - <input type="number" placeholder="Year" style="width:50px;">(DD-MM-YYYY)</td>
            </tr>
            <tr>
                <td>Mobile no:</td>
                <td colspan="3"><input type="text" placeholder="+91" style="width:20px;">- <input type="number" style="padding-right: 154px;"> </td>
            </tr>
            <tr>
                <td>Email id:</td>
                <td><input type="mail" style="padding-right:190px;"></td>
            </tr>
            <tr>
                <td>Password:</td>
                <td><input type="password" style="padding-right:190px;"></td>
            </tr>
            <tr>
                <td>Gender:</td>
                <td><input type="radio" name="gender"> Male<input type="radio" name="gender">Female </td>
            </tr>
            <tr>
                <td>Department:</td>
                <td><input type="checkbox"> CSE <input type="checkbox"> IT <input type="checkbox"> ECE <input type="checkbox" > Civil <input type="checkbox"> Mech</td>
            </tr>
            <tr>
                <td>Course:</td>
                <td>
                    <select>
                        <option>--------------------select current course's--------------------</option>
                        <option>1</option>
                        <option>2</option>
                        <option>3</option>
                        <option>4</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td>Student Photo:</td>
                <td><a href="#" style="border:1px solid;text-decoration:none; border-radius:3px;">choose File</a> No file chosen</td>
            </tr>
            <tr>
                <td>City:</td>
                <td><input type="text" style="padding-right:190px;"></td>
            </tr>
            <tr>
                <td>Address:</td>
                <td><input type="text" style="width:350px; height:50px;"></td>
            </tr>
            <tr>
                <td></td>
                <td style="padding-left: 100px;"><button>Register</button></td>
            </tr>
        </table>
    </form>
</body>
</html>
