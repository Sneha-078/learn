<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .registration,p{
            background-color: rgb(189, 195, 129);
            border: 1px solid;
            height:600px;
            width:500px;
            
        }
        p{
            margin-left: 570px;
            margin-right: 530px;
        }
        .registration{
            margin-left: 570px;
        }
        .loginpage{
            background-color: rgb(197, 228, 113);
            margin-left: 640px;

        }
    </style>
</head>
<body>
    
    <form>
        <table class="registration">
            <tr>
                <td colspan="3" style="text-align:center;"> <b>Registration</b></td>
            </tr>
            <tr>
                <td>First name</td>
                <td>:</td>
                <td><input type="text" placeholder="Enter First name"> </td>
            </tr>
            <tr>
                <td>Last name</td>
                <td>:</td>
                <td><input type="text" placeholder="Enter Last name"> </td>
            </tr>
            <tr>
                <td>Phone Number</td>
                <td>:</td>
                <td><input type="number" placeholder="Enter Phone number"> </td>
            </tr>
            <tr>
                <td>email Id</td>
                <td>:</td>
                <td><input type="email" placeholder="Enter email"> </td>
            </tr>
            <tr>
                <td>Password</td>
                <td>:</td>
                <td><input type="password" placeholder="Enter Password"> </td>
            </tr>
            <tr>
                <td>Confirm Password</td>
                <td>:</td>
                <td><input type="Password" placeholder="Enter Password"> </td>
            </tr>
            <tr>
                <td>Gender</td>
                <td>:</td>
                <td><input type="radio" name="gender"> female <input type="radio" name="gender">male <input type="radio" name="gender"> others</td>
            </tr>
            <tr>
                <td>hobbies</td>
                <td>:</td>
                <td><input type="checkbox"> reading <input type="checkbox"> listening to music <input type="checkbox">playing</td>
            </tr>
            <tr>
                <td>Date</td>
                <td>:</td>
                <td><input type="date"> </td>
            </tr>
                        <tr>
                <td>Time</td>
                <td>:</td>
                <td><input type="time"> </td>
            </tr>
            <tr>
                <td>State</td>
                <td>:</td>
                <td> <select>
                        <option>--select--</option>
                        <option> AP</option>
                        <option>TS</option>
                        <option>TN</option>
                        <option>KS</option>
                    </select></td>
            </tr>
            <tr>
                <td colspan="8" style="text-align: center;"><button>submit</button></td>
            </tr>


        </table>
    </form>




    <hr>
    <form>
        <table class="loginpage">
            <tr>
                <td colspan="4" style="text-align:center;"><h3>Login Page</h3></td>
            </tr>

            </tr>

                <td>email Id</td>

                <td><input type="email" placeholder="Enter email"> </td>
            </tr>
                        <tr>
                <td>Password</td>
                <td>:</td>
                <td><input type="password" placeholder="Enter Password"> </td>
            </tr>
            <tr>
                <td colspan="4" style="text-align:center"><button>Submit</button></td>
            </tr>
        </table>
    </form>

</html>
